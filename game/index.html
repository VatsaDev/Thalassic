<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Runemania - Character Select</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #1a1a1a;
            background-image:
                linear-gradient(rgba(20, 20, 20, 0.9) 1px, transparent 1px),
                linear-gradient(90deg, rgba(20, 20, 20, 0.9) 1px, transparent 1px);
            background-size: 30px 30px;
            font-family: 'Press Start 2P', cursive;
            color: #fff;
            user-select: none;
            overflow: hidden;
        }

        .lobby-panel {
            background-color: #2a2a2a;
            border: 4px solid #555;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            box-shadow: 10px 10px 0px rgba(0, 0, 0, 0.5);
            width: 90%;
            max-width: 600px;
            z-index: 10;
            position: relative;
        }

        h1 {
            color: #ffd700;
            text-shadow: 3px 3px 0px #aa0000;
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 15px;
            font-size: 14px;
            color: #aaa;
        }

        .input-group input {
            background-color: #111;
            border: 2px solid #555;
            color: #fff;
            font-family: 'VT323', monospace;
            font-size: 28px;
            padding: 10px 15px;
            width: 80%;
            text-align: center;
            text-transform: uppercase;
        }

        .input-group input:focus {
            outline: none;
            border-color: #ffd700;
        }

        /* 3D Viewer Container */
        .viewer-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto 20px auto;
            border: 4px solid #444;
            border-radius: 8px;
            background: radial-gradient(circle, #333 0%, #111 100%);
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.8);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            border-radius: 4px;
        }

        .arrow-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: #222;
            border: 3px solid #666;
            color: #fff;
            font-family: 'Press Start 2P', cursive;
            font-size: 24px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            line-height: 38px;
            text-align: center;
            border-radius: 50%;
            transition: all 0.2s;
            user-select: none;
        }

        .arrow-btn:hover {
            background: #444;
            border-color: #ffd700;
            color: #ffd700;
            transform: translateY(-50%) scale(1.1);
        }

        .arrow-btn:active {
            transform: translateY(-50%) scale(0.9);
        }

        #prev-btn {
            left: -20px;
        }

        #next-btn {
            right: -20px;
        }

        .skin-name {
            position: absolute;
            bottom: 15px;
            width: 100%;
            text-align: center;
            font-family: 'VT323', monospace;
            font-size: 24px;
            color: #ffd700;
            text-shadow: 2px 2px 0 #000;
            pointer-events: none;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'VT323', monospace;
            font-size: 24px;
            color: #fff;
            text-shadow: 2px 2px 0 #000;
            pointer-events: none;
        }

        /* Play Button */
        button[type="submit"] {
            background-color: #4CAF50;
            color: white;
            border: 4px solid #2E7D32;
            padding: 15px 40px;
            font-family: 'Press Start 2P', cursive;
            font-size: 18px;
            cursor: pointer;
            border-radius: 4px;
            box-shadow: 4px 4px 0px rgba(0, 0, 0, 0.5);
            transition: transform 0.1s, background-color 0.2s;
            margin-top: 10px;
        }

        button[type="submit"]:hover {
            background-color: #45a049;
            transform: translateY(-2px);
            box-shadow: 6px 6px 0px rgba(0, 0, 0, 0.5);
        }

        button[type="submit"]:active {
            transform: translateY(2px);
            box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.5);
        }

        /* Banner */
        .pixel-banner {
            display: block;
            background-color: #4a148c;
            border: 4px solid #7b1fa2;
            color: #fff;
            text-decoration: none;
            padding: 10px;
            border-radius: 4px;
            font-family: 'Press Start 2P', cursive;
            margin-bottom: 20px;
            box-shadow: 4px 4px 0px rgba(0, 0, 0, 0.5);
            transition: transform 0.1s, background-color 0.2s;
            text-align: center;
        }

        .pixel-banner:hover {
            background-color: #6a1b9a;
            transform: translateY(-2px);
            box-shadow: 6px 6px 0px rgba(0, 0, 0, 0.5);
        }

        .pixel-banner:active {
            transform: translateY(2px);
            box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.5);
        }

        .pixel-banner span {
            display: block;
            font-size: 14px;
            text-shadow: 2px 2px 0px #000;
        }

        .pixel-banner .banner-sub {
            font-family: 'VT323', monospace;
            font-size: 18px;
            color: #e0e0e0;
            margin-top: 5px;
            text-shadow: none;
        }

        /* Spell Loadout */
        .spell-loadout {
            background-color: #111;
            border: 4px solid #444;
            padding: 10px 15px;
            border-radius: 4px;
            margin: 0 auto 20px auto;
            width: 262px;
            text-align: left;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.8);
        }

        .spell-loadout h3 {
            color: #ffd700;
            font-size: 12px;
            margin-top: 0;
            margin-bottom: 10px;
            text-align: center;
            border-bottom: 2px dashed #444;
            padding-bottom: 5px;
            text-shadow: 1px 1px 0px #000;
        }

        .spell-item {
            font-family: 'VT323', monospace;
            font-size: 22px;
            color: #ddd;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
        }

        .spell-icon {
            display: inline-block;
            width: 16px;
            height: 16px;
            background-color: #333;
            border: 2px solid #555;
            margin-right: 10px;
            border-radius: 2px;
        }

        /* Tab System */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            background: #333;
            color: #aaa;
            border: 3px solid #555;
            padding: 8px 15px;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            cursor: pointer;
            border-radius: 4px;
        }

        .tab-btn.active {
            background: #ffd700;
            color: #000;
            border-color: #aa0000;
        }

        .inventory-panel {
            display: none;
            max-height: 350px;
            overflow-y: auto;
            background: #111;
            border: 4px solid #444;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            scrollbar-width: thin;
        }

        .inventory-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .inv-item {
            background: #222;
            border: 2px solid #444;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'VT323', monospace;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .inv-item:hover {
            border-color: #666;
        }

        .inv-item.equipped {
            border-color: #ffd700;
            background: #2a2510;
        }

        .inv-item-info {
            text-align: left;
        }

        .inv-item-name {
            font-size: 20px;
            color: #fff;
            margin-bottom: 2px;
        }

        .inv-item-stat {
            font-size: 18px;
            color: #4CAF50;
        }

        .inv-slot-badge {
            font-family: 'Press Start 2P', cursive;
            font-size: 8px;
            color: #ffd700;
        }
    </style>
</head>

<body>
    <div class="lobby-panel">
        <h1>RUNEMANIA</h1>

        <!-- Marketplace Banner -->
        <a href="marketplace.html" class="pixel-banner">
            <span>MARKETPLACE</span>
            <span class="banner-sub">GET NEW SPELLS & SKINS</span>
        </a>

        <div id="wallet-auth" style="margin-bottom: 20px;">
            <button id="connect-btn" type="button"
                style="background: #4a148c; color: white; border: 4px solid #7b1fa2; padding: 10px 20px; font-family: 'Press Start 2P', cursive; font-size: 10px; cursor: pointer; border-radius: 4px; box-shadow: 4px 4px 0px rgba(0,0,0,0.5);">CONNECT CROSSMARK</button>
            <div id="wallet-info"
                style="display: none; font-family: 'VT323', monospace; font-size: 18px; color: #ffd700; margin-top: 10px;">
            </div>
        </div>

        <form id="joinForm">
            <div class="input-group">
                <label for="username">ENTER WIZARD NAME</label>
                <input type="text" id="username" placeholder="PLAYER 1" required autocomplete="off" maxlength="12">
            </div>

            <div class="tabs">
                <div class="tab-btn active" id="tab-skins">SKINS</div>
                <div class="tab-btn" id="tab-inv">INVENTORY</div>
            </div>

            <div id="skins-view">
                <div class="viewer-container">
                    <div id="loading">LOADING...</div>
                    <div id="canvas-container"></div>
                    <div class="arrow-btn" id="prev-btn">&lt;</div>
                    <div class="arrow-btn" id="next-btn">&gt;</div>
                    <div class="skin-name" id="skin-name-display">FIRE MAGE</div>
                </div>

                <!-- Spell Loadout UI -->
                <div class="spell-loadout" id="spell-loadout">
                    <h3>SPELL LOADOUT</h3>
                    <div id="spell-list">
                        <!-- Spells populated by JS -->
                    </div>
                </div>
            </div>

            <div id="inventory-view" class="inventory-panel">
                <div id="inventory-list" class="inventory-grid">
                    <!-- Items populated by JS -->
                </div>
                <div style="font-family: 'VT323', monospace; font-size: 16px; color: #777; margin-top: 10px;">EQUIP UP
                    TO 3 ITEMS (BUFFS APPLY IN BATTLE)</div>
            </div>

            <!-- Hidden input to store selected skin index -->
            <input type="hidden" id="selectedSkin" value="0">

            <button type="submit">JOIN SERVER</button>
        </form>
    </div>

    <!-- Three.js CDN -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const container = document.getElementById('canvas-container');

        // Setup Scene
        const scene = new THREE.Scene();
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(300, 300);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        container.appendChild(renderer.domElement);

        const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
        camera.position.set(0, 3, 10);
        camera.lookAt(0, 2, 0);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);

        const models = [];
        let currentSkinIndex = 0;
        let activeModelParams = null; // Used to apply rotation

        const skinNames = [
            "BLOOD WARLOCK",
            "NATURE DRUID",
            "WIND WALKER",
            "WATER SHAPER",
            "ARCANE SCHOLAR",
            "FIRE MAGE",
        ];

        const modelFiles = [
            'assets/wizord_red.glb',
            'assets/wizord_green.glb',
            'assets/wizord_sky.glb',
            'assets/wizord_blu.glb',
            'assets/wizord_purp.glb',
            'assets/wizord_orang.glb'
        ];

        const classSpells = {
            0: ["BLOOD DRAIN", "CRIMSON SPIKES", "VAMPIRIC SWARM"],
            1: ["THORN WHIP", "ENTANGLE", "NATURE'S WRATH"],
            2: ["GALE BLAST", "TORNADO", "WIND SHEAR"],
            3: ["WATER BALL", "FROST NOVA", "TSUNAMI"],
            4: ["ARCANE MISSILES", "MANA RIFT", "MAGIC BURST"],
            5: ["FIREBALL", "FLAME BREATH", "FIRE SPEARS"]
        };

        const loader = new GLTFLoader();
        const loadingEl = document.getElementById('loading');

        // Load all wizard models
        async function loadAssets() {
            const loadPromises = modelFiles.map((file, index) => {
                return new Promise((resolve) => {
                    loader.load(file, (gltf) => {
                        const model = gltf.scene;

                        // Increase size and center
                        model.scale.set(1.5, 1.5, 1.5);
                        // Depending on the model's pivot, adjust y accordingly
                        model.position.y = -0.5;

                        models[index] = model;
                        resolve(model);
                    });
                });
            });

            await Promise.all(loadPromises);

            // Hide loading overlay and show the first model
            loadingEl.style.display = 'none';
            showModel(0);
        }

        function showModel(index) {
            // Remove previous model
            if (activeModelParams) {
                scene.remove(activeModelParams);
            }

            const model = models[index];
            if (model) {
                // reset starting rotation before display
                model.rotation.set(0, 0, 0);
                scene.add(model);
                activeModelParams = model;
            }

            // Update UI elements
            document.getElementById('skin-name-display').innerText = skinNames[index];
            document.getElementById('selectedSkin').value = index;

            // Update Spell Loadout
            const spellListEl = document.getElementById('spell-list');
            spellListEl.innerHTML = '';
            const spells = classSpells[index] || ["UNKNOWN", "UNKNOWN", "UNKNOWN"];
            spells.forEach(spell => {
                const spellDiv = document.createElement('div');
                spellDiv.className = 'spell-item';
                spellDiv.innerHTML = `<span class="spell-icon"></span> ${spell}`;
                spellListEl.appendChild(spellDiv);
            });
        }

        document.getElementById('prev-btn').addEventListener('click', () => {
            if (models.length === 0) return;
            currentSkinIndex = (currentSkinIndex - 1 + models.length) % models.length;
            showModel(currentSkinIndex);
        });

        document.getElementById('next-btn').addEventListener('click', () => {
            if (models.length === 0) return;
            currentSkinIndex = (currentSkinIndex + 1) % models.length;
            showModel(currentSkinIndex);
        });

        // Animation Loop
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();

            // Rotate the model around the Y axis faster
            if (activeModelParams) {
                activeModelParams.rotation.y += dt * 1.5;
            }

            renderer.render(scene, camera);
        }

        // Init flow
        loadAssets();
        animate();

        // Join / Routing Logic
        document.getElementById('joinForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim() || 'GUEST';
            const skinId = document.getElementById('selectedSkin').value;

            window.location.href = `game.html?username=${encodeURIComponent(username)}&skin=${skinId}`;
        });

        // Tab Switching
        const skinsTab = document.getElementById('tab-skins');
        const invTab = document.getElementById('tab-inv');
        const skinsView = document.getElementById('skins-view');
        const invView = document.getElementById('inventory-view');

        skinsTab.addEventListener('click', () => {
            skinsTab.classList.add('active');
            invTab.classList.remove('active');
            skinsView.style.display = 'block';
            invView.style.display = 'none';
        });

        invTab.addEventListener('click', () => {
            invTab.classList.add('active');
            skinsTab.classList.remove('active');
            invView.style.display = 'block';
            skinsView.style.display = 'none';
            renderInventory();
        });

        // Inventory Logic
        function renderInventory() {
            const list = document.getElementById('inventory-list');
            list.innerHTML = '';

            const inv = JSON.parse(localStorage.getItem('runemania_inventory') || '[]');
            const equippedIds = JSON.parse(localStorage.getItem('runemania_equipped') || '[]');

            if (inv.length === 0) {
                list.innerHTML = '<div style="color: #555; padding: 20px;">NO ITEMS FOUND. WIN BATTLES TO EARN CHESTS!</div>';
                return;
            }

            inv.forEach(item => {
                const el = document.createElement('div');
                const isEquipped = equippedIds.includes(item.id);
                el.className = `inv-item ${isEquipped ? 'equipped' : ''}`;
                el.style.borderLeftColor = item.color;
                el.style.borderLeftWidth = '6px';

                el.innerHTML = `
                    <div class="inv-item-info">
                        <div class="inv-item-name" style="color: ${item.color}">${item.name}</div>
                        <div class="inv-item-stat">+${item.value} ${item.type.toUpperCase()}</div>
                    </div>
                    ${isEquipped ? '<div class="inv-slot-badge">EQUIPPED</div>' : ''}
                `;

                el.addEventListener('click', () => toggleEquip(item.id));
                list.appendChild(el);
            });
        }

        function toggleEquip(id) {
            let equippedIds = JSON.parse(localStorage.getItem('runemania_equipped') || '[]');

            if (equippedIds.includes(id)) {
                equippedIds = equippedIds.filter(eid => eid !== id);
            } else {
                if (equippedIds.length < 3) {
                    equippedIds.push(id);
                } else {
                    alert("MAX 3 ITEMS EQUIPPED!");
                }
            }

            localStorage.setItem('runemania_equipped', JSON.stringify(equippedIds));
            renderInventory();
        }

        // Wallet Integration (Crossmark)
        function getSdk() {
            return window.xrpl?.crossmark || window.crossmark;
        }

        async function connectWallet() {
            const btn = document.getElementById('connect-btn');
            const info = document.getElementById('wallet-info');
            const sdk = getSdk();

            if (!sdk) {
                alert('Install Crossmark wallet extension to connect.');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'CONNECTING...';

            try {
                const signIn = sdk.async?.signInAndWait || sdk.methods?.signInAndWait;
                if (!signIn) {
                    alert('Crossmark signIn not available.');
                    btn.disabled = false;
                    btn.textContent = 'CONNECT CROSSMARK';
                    return;
                }

                const res = await signIn.call(sdk);
                const addr = res?.response?.data?.address || res?.data?.address || res?.address || (typeof res?.data === 'string' ? res.data : null);

                if (addr && typeof addr === 'string') {
                    localStorage.setItem('runemania_wallet', addr);
                    info.textContent = `CONNECTED: ${addr.substring(0, 6)}...${addr.substring(addr.length - 4)}`;
                    info.style.display = 'block';
                    btn.style.display = 'none';
                    console.log("Wallet saved:", addr);
                } else {
                    console.warn('Crossmark response:', res);
                    alert('Could not get address. Confirm in Crossmark.');
                }
            } catch (e) {
                console.error('Crossmark connect error:', e);
                alert(e?.message || 'Connection failed.');
            }
            btn.disabled = false;
            btn.textContent = 'CONNECT CROSSMARK';
        }

        document.getElementById('connect-btn').onclick = connectWallet;

        // Auto-connect if already in localStorage
        (async () => {
            const savedAddr = localStorage.getItem('runemania_wallet');
            if (savedAddr) {
                const info = document.getElementById('wallet-info');
                const btn = document.getElementById('connect-btn');
                info.textContent = `CONNECTED: ${savedAddr.substring(0, 6)}...${savedAddr.substring(savedAddr.length - 4)}`;
                info.style.display = 'block';
                btn.style.display = 'none';
            }
        })();
    </script>
</body>

</html>
