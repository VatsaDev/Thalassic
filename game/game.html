<!DOCTYPE html>
<html>
<head>
    <title>Runemania</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Press Start 2P', cursive; }
        canvas { display: block; }
        
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            pointer-events: none; /* Let clicks pass through to game */
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
        }

        #match-timer {
            color: white;
            font-size: 24px;
            text-shadow: 2px 2px 0px #000;
            margin-bottom: 15px;
        }

        #hp-container, #mana-container {
            width: 400px;
            height: 25px;
            background-color: rgba(0, 0, 0, 0.6);
            border: 4px solid #333;
            border-radius: 4px;
            position: relative;
            margin-bottom: 5px;
        }

        #hp-bar {
            width: 100%;
            height: 100%;
            background-color: #4CAF50; /* Green health */
            transition: width 0.2s;
        }

        #mana-bar {
            width: 50%;
            height: 100%;
            background-color: #2196F3; /* Blue Mana */
            transition: width 0.2s;
        }

        #hp-text, #mana-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 12px;
            text-shadow: 1px 1px 0px #000;
        }

        #hotbar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 100;
        }

        .spell-slot {
            width: 80px;
            height: 80px;
            background-color: rgba(0, 0, 0, 0.7);
            border: 4px solid #444;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            font-size: 10px;
            transition: all 0.2s;
            position: relative;
        }

        .spell-slot.active {
            border-color: #ffd700; /* Gold highlight */
            background-color: rgba(50, 50, 0, 0.8);
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }

        .spell-key {
            position: absolute;
            top: -10px;
            left: -10px;
            background: #fff;
            color: #000;
            padding: 4px 8px;
            border-radius: 50%;
            font-size: 10px;
            font-weight: bold;
            border: 2px solid #000;
        }

        #kd-display {
            position: absolute;
            bottom: 25px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            border: 3px solid #660000;
            border-radius: 6px;
            padding: 8px 16px;
            z-index: 100;
            pointer-events: none;
        }

        #kd-text {
            color: #ff4444;
            font-size: 11px;
            text-shadow: 1px 1px 0px #000;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div id="hud">
        <div id="match-timer">05:00</div>
        <div id="hp-container">
            <div id="hp-bar"></div>
            <div id="hp-text">100 / 100</div>
        </div>
        <div id="mana-container">
            <div id="mana-bar"></div>
            <div id="mana-text">50 / 100</div>
        </div>
    </div>

    <div id="kd-display">
        <span id="kd-text">K: 0  D: 0  KD: 0.0</span>
    </div>

    <div id="hotbar">
        <div class="spell-slot active" id="slot-0">
            <div class="spell-key">1</div>
            <span id="spell-name-0">SPELL 1</span>
        </div>
        <div class="spell-slot" id="slot-1">
            <div class="spell-key">2</div>
            <span id="spell-name-1">SPELL 2</span>
        </div>
        <div class="spell-slot" id="slot-2">
            <div class="spell-key">3</div>
            <span id="spell-name-2">SPELL 3</span>
        </div>
    </div>
    <!-- Socket.io Client Library -->
    <script src="/socket.io/socket.io.js"></script>
    
    <!-- Three.js CDN -->
    <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
</script>

    <!-- Game Logic -->
    <script type="module" src="game.js"></script>
</body>
</html>
